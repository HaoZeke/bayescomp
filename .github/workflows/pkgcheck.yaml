on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: pkgcheck

permissions: read-all

jobs:
  pkgcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ropensci-review-tools/pkgcheck-action@main
        with:
          post-to-issue: false
